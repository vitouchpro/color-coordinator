      <h3>What is a color wheel and how do I use it to pick colors?</h3>
      <p>A color wheel arranges hues in a circle so you can see the relationships between colors. In Color Coordinator, drag anywhere on the wheel to set your base hue and saturation, adjust lightness with the slider, then choose a harmony rule to generate a matching palette automatically.</p>
      <h3>Which color harmony should I choose for a website theme?</h3>
      <p>Analogous palettes feel calm and cohesive, ideal for brand and content sites. Complementary palettes give high contrast, useful for call-to-action buttons. Triadic and tetradic schemes suit vibrant, creative designs, while monochrome works well for minimal, professional interfaces.</p>
